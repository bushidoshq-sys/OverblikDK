  function renderSections(){
    const root = document.getElementById('regionSections');
    root.innerHTML = '';
    let total = 0;

    REGIONS.forEach(group => {
      const section = document.createElement('section');
      section.className = 'region-section';
      section.dataset.region = group.region.toLowerCase();

      const h2 = document.createElement('h2');
      h2.textContent = group.region;
      section.appendChild(h2);

      const ul = document.createElement('ul');
      ul.className = 'link-list';
      ul.setAttribute('aria-label', group.region);

      const sorted = sortDa(group.links, 'name');
      sorted.forEach(({name, url}) => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${url}" target="_blank" rel="noopener"><span>${name}</span><span class="host">${host(url)}</span></a>`;
        ul.appendChild(li);
      });

      total += sorted.length;
      section.appendChild(ul);
      root.appendChild(section);
    });

    document.getElementById('count').textContent = String(total);
  }

  function wireFilter(){
    const input = document.getElementById('filter');
    input.addEventListener('input', () => {
      const q = input.value.toLowerCase().trim();
      let visibleCount = 0;

      for (const section of document.querySelectorAll('.region-section')) {
        let sectionHasVisible = false;
        const regionName = section.dataset.region || '';

        for (const li of section.querySelectorAll('li')) {
          const match = li.textContent.toLowerCase().includes(q) || regionName.includes(q);
          li.style.display = match ? '' : 'none';
          if (match) {
            visibleCount++;
            sectionHasVisible = true;
          }
        }

        section.style.display = sectionHasVisible ? '' : 'none';
      }

      document.getElementById('count').textContent = String(visibleCount);
    });
  }

  renderSections();
  wireFilter();
  document.getElementById('year').textContent = new Date().getFullYear();
