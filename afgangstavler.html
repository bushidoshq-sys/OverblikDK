<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OverblikDK – Transport</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <script>
    (function () {
      const savedTheme = localStorage.getItem('overblikdk-theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
<header class="header">
  <div class="brand container">
    <div class="logo" aria-hidden="true"></div>
    <div>
      <h1>OverblikDK</h1>
      <small>Transport</small>
    </div>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Skift mellem lys og mørk visning" aria-pressed="false">
      <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
      <span class="theme-toggle__text">Mørk</span>
    </button>
  </div>
  <div class="navline"></div>
</header>

<main class="container">
  <p><a class="back" href="transport.html">← Tilbage til transport</a></p>
  <section class="departure-panel">
    <div class="departure-head">
      <div>
        <p class="kicker">Funktion fjernet</p>
        <h2>🧭 Ruter og køreplaner</h2>
        <p>Live-afgangstavlen er fjernet fra OverblikDK. Brug transport-siden til officielle rute- og køreplanslinks.</p>
      </div>
      <a class="emergency-call departure-link-button" href="transport.html">Åbn transport</a>
    </div>
  </section>
</main>

<footer class="container">© <span id="year"></span> OverblikDK · BushidoDK</footer>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
<script src="assets/theme.js"></script>
<script src="assets/pwa-update.js"></script>
</body>
</html>
